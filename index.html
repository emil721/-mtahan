<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF İmtahan Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
h1, h2 {
    color: #333;
}
button{
    padding:12px 20px;
    cursor:pointer;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    margin-right: 5px;
    transition: 0.2s;
}
button:hover{
    background: #0056b3;
}
.option{
    border:1px solid #ccc;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    transition: 0.2s;
}
.option:hover{
    background:#eee;
}
.option.selected {
    background: #d1ecf1;
    border-color: #bee5eb;
    color: #0c5460;
    font-weight: bold;
}
#examArea, #resultArea{
    display:none;
}
#timer{
    color:red;
    font-size:24px;
    font-weight:bold;
    text-align: right;
}
.navigation-buttons {
    margin-top: 20px;
    border-top: 1px solid #eee;
    padding-top: 15px;
}

/* --- Nəticə Hesabatı üçün CSS --- */
#resultDetails {
    margin-top: 30px;
}
.result-block {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    background: #fff;
}
.result-block.correct-block {
    border-left: 5px solid green;
}
.result-block.wrong-block {
    border-left: 5px solid red;
}
.result-block.empty-block {
    border-left: 5px solid orange;
}
.result-question {
    font-weight: bold;
    font-size: 1.1em;
    margin-bottom: 10px;
}
.result-answer {
    padding: 8px;
    border-radius: 5px;
    margin-top: 5px;
}
.your-answer {
    color: #333;
}
.correct-answer {
    font-weight: bold;
    color: green;
}
.wrong-answer {
    font-weight: bold;
    color: red;
}
.label {
    font-weight: bold;
    color: #555;
    margin-right: 5px;
}
</style>
</head>
<body>

<div class="container">

<h1>PDF İmtahan Sistemi</h1>

<div id="setup">
    <p>Zəhmət olmasa imtahan PDF-ni yükləyin (Suallar nömrələnmiş, variantlar • və ya √ ilə ayrılmış olmalıdır):</p>
    <input type="file" id="pdfFile" accept=".pdf">
    <br><br>
    <button onclick="startExam()">İmtahana Başla</button>
</div>

<div id="examArea">
    <div id="timer">90:00</div>
    <hr>
    <div id="questionNumber" style="font-weight: bold; color: #555;"></div>
    <div id="questionText"></div>
    <div id="options"></div>

    <div class="navigation-buttons">
        <button onclick="prevQuestion()">Geri</button>
        <button onclick="nextQuestion()">İrəli</button>
        <button onclick="finishExam()" style="background: #dc3545; float: right;">İmtahanı Bitir</button>
    </div>
</div>

<div id="resultArea">
    <h2>İmtahan Nəticəsi</h2>
    <hr>
    <h3 id="correctCount" style="color: green;"></h3>
    <h3 id="wrongCount" style="color: red;"></h3>
    <h3 id="emptyCount" style="color: orange;"></h3>
    <h3 id="scorePercent"></h3>
    <br>
    <button onclick="location.reload()">Yenidən Başla</button>
    
    <div id="resultDetails"></div>
</div>

</div>

<script>
let questions = [];
let currentQuestion = 0;
let answers = {}; 
let timerInterval;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function startExam(){
    const file = document.getElementById("pdfFile").files[0];

    if(!file){
        alert("Zəhmət olmasa əvvəlcə bir PDF faylı seçin.");
        return;
    }

    const pdfData = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
    let fullText = "";

    for(let i=1; i<=pdf.numPages; i++){
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const text = content.items.map(x=>x.str).join(" ");
        fullText += "\n" + text;
    }

    parseQuestions(fullText);

    if(questions.length === 0) {
        alert("PDF-dən sual oxumaq mümkün olmadı. Formatın düzgün olduğundan əmin olun (1., •, √).");
        return;
    }

    if(questions.length > 50){
        questions = shuffleArray(questions);
        questions = questions.slice(0,50);
    } else {
        questions = shuffleArray(questions);
    }

    document.getElementById("setup").style.display="none";
    document.getElementById("examArea").style.display="block";

    startTimer();
    showQuestion();
}

function parseQuestions(text){
    questions = [];
    const blocks = text.split(/\d+\./g);

    blocks.forEach(block=>{
        block = block.trim();
        if(!block) return;

        const lines = block.split(/(?=[•√])/g).map(x=>x.trim()).filter(Boolean);

        if(lines.length < 2) return; 

        const questionText = lines[0];
        const rawOptionsWithSymbols = lines.slice(1);

        let correctText = "";
        let finalOptions = [];

        rawOptionsWithSymbols.forEach(opt => {
            let cleanOpt = opt.replace(/^[•√]\s*/, "").trim();
            
            if(opt.startsWith("√")) {
                correctText = cleanOpt;
            }
            
            if(cleanOpt) {
                finalOptions.push(cleanOpt);
            }
        });

        if(!correctText && finalOptions.length > 0) {
            correctText = finalOptions[0]; 
        }

        const shuffledOpts = shuffleArray(finalOptions);

        questions.push({
            question: questionText,
            options: shuffledOpts,
            correct: correctText 
        });
    });
}

function showQuestion(){
    const q = questions[currentQuestion];

    document.getElementById("questionNumber").innerHTML =
    "Sual " + (currentQuestion+1) + " / " + questions.length;

    document.getElementById("questionText").innerHTML =
    "<h3>" + q.question + "</h3>";

    const box = document.getElementById("options");
    box.innerHTML="";

    q.options.forEach((option, index)=>{
        const div = document.createElement("div");
        div.className = "option";
        
        if(answers[currentQuestion] === option) {
            div.className += " selected";
        }

        div.textContent = option;

        div.onclick = () => {
            answers[currentQuestion] = option;
            showQuestion(); 
        };

        box.appendChild(div);
    });
}

function nextQuestion(){
    if(currentQuestion < questions.length-1){
        currentQuestion++;
        showQuestion();
    }
}

function prevQuestion(){
    if(currentQuestion > 0){
        currentQuestion--;
        showQuestion();
    }
}

// --- YENİLƏNMİŞ HESABAT ARDICILLIĞI FUNKSİYASI ---
function finishExam(){
    clearInterval(timerInterval); 

    let correctCount = 0;
    let wrongCount = 0;
    let emptyCount = 0;

    const resultDetailsBox = document.getElementById("resultDetails");
    resultDetailsBox.innerHTML = "<h2>Detallı Hesabat (Səhvlər ➔ Boşlar ➔ Düzlər ardıcıllığı ilə):</h2>";

    // Sualları 3 qrupa ayırmaq üçün HTML torbaları yaradırıq
    let wrongQuestionsHtml = "";  // 1. Səhvlər (Qırmızı)
    let emptyQuestionsHtml = "";  // 2. Boşlar (Narıncı)
    let correctQuestionsHtml = ""; // 3. Düzlər (Yaşıl)

    questions.forEach((q, index) => {
        const userAnswer = answers[index];
        let statusClass = ""; 
        let userAnswerHtml = "";
        let currentBlockHtml = "";
        let targetGroup = "wrong"; // Şərti olaraq qrup adı

        if(!userAnswer) {
            emptyCount++;
            statusClass = "empty-block";
            userAnswerHtml = `<span class="your-answer label" style="color: orange;">Cavab vermədiniz.</span>`;
            targetGroup = "empty";
        } else if(userAnswer === q.correct) {
            correctCount++;
            statusClass = "correct-block";
            userAnswerHtml = `<span class="your-answer correct-answer"><span class="label">Cavabınız:</span>${userAnswer} (Düz)</span>`;
            targetGroup = "correct";
        } else {
            wrongCount++;
            statusClass = "wrong-block";
            userAnswerHtml = `<span class="your-answer wrong-answer"><span class="label">Cavabınız:</span>${userAnswer} (Səhv)</span>`;
            targetGroup = "wrong";
        }

        currentBlockHtml = `
            <div class="result-block ${statusClass}">
                <div class="result-question">Sual ${index + 1}: ${q.question}</div>
                <div class="result-answer">${userAnswerHtml}</div>
                <div class="result-answer"><span class="correct-answer"><span class="label">Düzgün cavab:</span>${q.correct}</span></div>
            </div>
        `;

        // Bloku öz aid olduğu kateqoriyanın içinə atırıq
        if(targetGroup === "wrong") {
            wrongQuestionsHtml += currentBlockHtml;
        } else if(targetGroup === "empty") {
            emptyQuestionsHtml += currentBlockHtml;
        } else {
            correctQuestionsHtml += currentBlockHtml;
        }
    });

    // Ekranda tam istədiyin ardıcıllıqla birləşdiririk: Səhv -> Boş -> Düz
    resultDetailsBox.innerHTML += wrongQuestionsHtml + emptyQuestionsHtml + correctQuestionsHtml;

    document.getElementById("examArea").style.display = "none";
    document.getElementById("resultArea").style.display = "block";

    document.getElementById("correctCount").textContent = "Düzgün cavablar: " + correctCount;
    document.getElementById("wrongCount").textContent = "Səhv cavablar: " + wrongCount;
    document.getElementById("emptyCount").textContent = "Cavabsız (Boş): " + emptyCount;
    
    let percent = Math.round((correctCount / questions.length) * 100);
    document.getElementById("scorePercent").textContent = "Müvəffəqiyyət faizi: " + percent + "%";
    
    window.scrollTo(0, 0);
}

function shuffleArray(array){
    return [...array].sort(()=>Math.random()-0.5);
}

function startTimer(){
    let time = 90*60;
    const timer = document.getElementById("timer");

    timerInterval = setInterval(()=>{
        let min = Math.floor(time/60);
        let sec = time%60;

        timer.textContent =
        String(min).padStart(2,"0")
        + ":"
        + String(sec).padStart(2,"0");

        time--;

        if(time < 0){
            clearInterval(timerInterval);
            finishExam();
        }
    }, 1000);
}
</script>

</body>
</html>
